# Codecov의 전역 설정을 정의합니다.
coverage:
  status:
    # 프로젝트 전체의 커버리지 상태를 설정합니다.
    project:
      default:
        # 전체 커버리지 목표치를 60%로 설정합니다.
        target: 60%
        # 커버리지가 이전보다 1% 떨어지는 것까지는 허용합니다.
        threshold: 1%
    # PR에서 변경된 코드(patch)의 커버리지 상태를 설정합니다.
    patch:
      default:
        # 새로운 코드에 대해서는 70%의 커버리지를 목표로 합니다.
        target: 70%

# PR에 달릴 댓글의 형식을 설정합니다.
comment:
  layout: "reach,diff,flags,tree"
  behavior: default # 새로운 커밋이 푸시되면 기존 댓글을 수정합니다.
  require_changes: false # 커버리지 변경이 없어도 댓글을 답니다.

# CI에서 사용하는 Flag들을 정의합니다.
flags:
  frontend:
    paths:
      - apps/frontend/
    target: 60% # 프론트엔드 커버리지 목표치를 60%로 설정합니다.
  backend:
    paths:
      - apps/backend/
    target: 60% # 백엔드 커버리지 목표치를 60%로 설정합니다.

# 커버리지 계산에서 제외할 경로를 지정합니다.
ignore:
  - "**/node_modules"
  - "apps/backend/build"
  - "apps/backend/config/S3Config.java"
  - "apps/frontend/dist"
  - "apps/backend/src/main/java/scrumpledpaper/agiler/auth/**"
  - "apps/backend/src/main/java/scrumpledpaper/agiler/common/config/**"
  - "apps/backend/src/main/java/scrumpledpaper/agiler/user/controller/AuthController.java"
