name: Collab WSS CD

on:
  push:
    branches:
      - 'dev'
    paths:
      - 'apps/collab-wss/**'
      - '.github/workflows/wss_cd.yml'
  workflow_dispatch:

concurrency:
  group: collab-wss-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy Collab WSS to Test Server
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1) 서버 배포 디렉토리 정리 (stale file 방지)
      - name: Prepare deploy dir
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            DEPLOY_PATH="/home/ubuntu/collab-wss"
            mkdir -p "$DEPLOY_PATH"
            rm -rf "$DEPLOY_PATH"/*

      # 2) 전체 소스 안전하게 복사
      - name: Transfer files to server
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "apps/collab-wss/**"
          target: "/home/ubuntu/collab-wss"
          strip_components: 2

      # 3) 서버에서 prod deps 설치 + env 주입 + pm2 재시작
      - name: Deploy with PM2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -euo pipefail

            DEPLOY_PATH="/home/ubuntu/collab-wss"
            cd "$DEPLOY_PATH"

            # Load nvm (non-interactive ssh에서도 node/npm/pm2 잡히게)
            export NVM_DIR="$HOME/.nvm"
            if [ -s "$NVM_DIR/nvm.sh" ]; then
              . "$NVM_DIR/nvm.sh"
            else
              echo "nvm.sh not found at $NVM_DIR/nvm.sh"
              exit 1
            fi

            nvm use 23

            node -v
            npm -v
            pm2 -v

            npm ci --omit=dev

            cat > .env <<'EOF'
            ${{ secrets.COLLAB_WSS_ENV }}
            EOF
            chmod 600 .env

            if pm2 describe collab-wss > /dev/null 2>&1; then
              pm2 restart collab-wss --update-env
            else
              pm2 start npm --name "collab-wss" -- start
            fi

            pm2 save
