name: Collab WSS CD

on:
  push:
    branches:
      - 'dev'
    paths:
      - 'apps/collab-wss/**'
      - '.github/workflows/wss_cd.yml'
  workflow_dispatch:

concurrency:
  group: collab-wss-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy Collab WSS to Test Server
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build (generate dist)
        working-directory: ./apps/collab-wss
        run: |
          npm ci
          npm run build

      # 1) 서버 배포 디렉토리 정리 (stale file 방지)
      - name: Prepare deploy dir
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            DEPLOY_PATH="/home/ubuntu/collab-wss"
            mkdir -p "$DEPLOY_PATH"
            rm -rf "$DEPLOY_PATH"/*

      - name: Transfer build artifacts to server
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: |
            apps/collab-wss/dist/**
            apps/collab-wss/package.json
            apps/collab-wss/package-lock.json
          target: "/home/ubuntu/collab-wss"
          strip_components: 2

      - name: Deploy with PM2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -euo pipefail

            DEPLOY_PATH="/home/ubuntu/collab-wss"
            cd "$DEPLOY_PATH"

            # Load nvm
            export NVM_DIR="$HOME/.nvm"
            . "$NVM_DIR/nvm.sh"

            nvm use 23

            npm ci --omit=dev

            cat > .env <<'EOF'
            ${{ secrets.COLLAB_WSS_ENV }}
            EOF
            chmod 600 .env

            if pm2 describe collab-wss > /dev/null 2>&1; then
              pm2 restart collab-wss --update-env
            else
              pm2 start "node dist/main.js" --name "collab-wss"
            fi

            pm2 save
