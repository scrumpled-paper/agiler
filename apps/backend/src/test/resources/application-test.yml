spring:
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: "<YOUR_GOOGLE_CLIENT_ID>"
            client-secret: "<YOUR_GOOGLE_CLIENT_SECRET>"
            scope:
              - profile
              - email
          github:
            client-id: "<YOUR_GITHUB_CLIENT_ID>"
            client-secret: "<YOUR_GITHUB_CLIENT_SECRET>"
            scope:
              - user:email
              - read:user
          slack:
            client-id: "<>"
            client-secret: "<>"
            scope: identity.basic
            redirect-uri:
              "{baseUrl}/api/v1/notifications/slack/callback"
            provider: slack
            authorization-grant-type: authorization_code
          discord:
            client-id: "<>>"
            client-secret: "<>"
            scope: identify
            redirect-uri:
              "{baseUrl}/api/login/oauth2/code/{registrationId}"
            provider: discord
            authorization-grant-type: authorization_code
        provider:
          discord:
            authorization-uri: https://discord.com/api/oauth2/authorize
            token-uri: https://discord.com/api/oauth2/token
            user-info-uri: https://discord.com/api/users/@me
            user-name-attribute: id
          slack:
            authorization-uri: https://slack.com/oauth/v2/authorize
            token-uri: https://slack.com/api/oauth.v2.access
            user-info-uri: https://slack.com/api/users.identity
            user-name-attribute: user.id
  data:
    redis:
      host: localhost
      port: 6379
  datasource:
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

app:
  auth:
    tokenSecret: "scrumpledpaperdummydummysecretkey"
    refreshTokenSecret: "scrumpledpaperanotherdummydummysecretkey"
    token-expiry: 86400000
    refresh-token-expiry: 604800000
  api:
    key: "scumpleddummypaperdummyapikeydummykey"
    wss-token-expiry: 300000
  oauth2:
    authorizedRedirectUris:
      - http://localhost:3000/oauth2/redirect

cloud:
  aws:
    s3:
      bucket: agiler-bucket
